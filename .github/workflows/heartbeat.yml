name: sovereign-heartbeat

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  signal-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Restore signal state cache
        uses: actions/cache@v4
        with:
          path: .state
          key: sovereign-signal-state-${{ github.ref_name }}

      - name: Run Sovereign signal worker
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          APP_URL: ${{ secrets.APP_URL }}
        run: uv run python -m learning_machine.signal_worker
